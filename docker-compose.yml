version: "3.8"

services:
  app:
    build: .
    container_name: spring-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql
#      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/self_management
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
#      SPRING_REDIS_HOST: redis

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: self_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

#  redis:
#    image: redis:7
#    container_name: redis-cache
#    restart: always
#    ports:
#      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

#  adminer:
#    image: adminer
#    container_name: adminer-ui
#    restart: always
#    ports:
#      - "8081:8080"

volumes:
  mysql_data: